    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SimSun', serif;
            line-height: 1.6;
            position: relative;
            padding-top: 85px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 85px;
            left: 0;
            width: 100vw;
            height: calc(100vh - 85px);
            background-image: url('傩趣.png');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            z-index: -1;
            opacity: 0.8;
        }

        /* 导航栏样式 */
        .navbar {
            background-color: #8b0000;
            color: white;
            padding: 15px 0;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10000;
            overflow: hidden;
        }

        .navbar::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 100"><path fill="%23ffffff" fill-opacity="1" d="M0,64L48,69.3C96,75,192,85,288,80C384,75,480,53,576,48C672,43,768,53,864,53.3C960,53,1056,43,1152,37.3C1248,32,1344,32,1392,32L1440,32L1440,100L1392,100C1344,100,1248,100,1152,100C1056,100,960,100,864,100C768,100,672,100,576,100C480,100,384,100,288,100C192,100,96,100,48,100L0,100Z"></path></svg>');
            background-size: cover;
            background-position: center;
        }

        .container {
            width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }

        .logo img {
            height: 40px;
            margin-right: 10px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
        }

        .nav-item {
            margin: 0 15px;
            position: relative;
        }

        .nav-item a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: block;
            padding: 5px 0;
        }

        .nav-item:hover .dropdown {
            display: block;
        }

        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #333;
            min-width: 150px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .dropdown li {
            list-style: none;
        }

        .dropdown li a {
            padding: 10px 15px;
            display: block;
        }

        .dropdown li a:hover {
            background-color: #444;
        }

        .user-icon {
            font-size: 20px;
        }

        /* 内容区域 */
        .content {
            padding: 10px 0;
            text-align: center;
        }

        .content h1 {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .content p {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
